<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Allure | Products</title>
</head>
<body>
    <nav>
        <div class="logo"><img src="ap.png" alt="Allure Logo"></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="pg_1.html">About</a></li>
            <li><a href="pg_2.html">Products</a></li>
            <li><a href="pg_3.html">Support</a></li>
        </ul>
    </nav>

    <main class="animate-page">
        <div class="product-grid">
            
            <div class="product-card">
                <div class="img-box">
                    <img src="shirt-front.jpg" alt="T-Shirt Front" class="front-img">
                    <img src="shirt-back.jpg" alt="T-Shirt Back" class="back-img">
                </div>
                <h3 style="margin-top: 15px;">Signature T-Shirt</h3>
                <p style="color: #777;">$70
                </p>
            </div>

            <div class="product-card">
                <div class="img-box">
                    <img src="bracelet.jpg" alt="Bracelet">
                </div>
                <h3 style="margin-top: 15px;">Handcrafted Bracelet</h3>
                <p style="color: #777;">$70
                </p>
            </div>

            <div class="product-card">
                <div class="img-box">
                    <img src="perfume.jpg" alt="Perfume">
                </div>
                <h3 style="margin-top: 15px;">Allure Essence</h3>
                <p style="color: #777;">$70</p>
            </div>

            <div class="product-card">
                <div class="img-box">
                    <img src="lipgloss.jpg" alt="Lipgloss">
                </div>
                <h3 style="margin-top: 15px;">Glass Shine</h3>
                <p style="color: #777;">$70</p>
            </div>

        </div>
    </main>
</body>
</html>
