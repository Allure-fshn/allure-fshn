<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/ap.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Allure | Products</title>
</head>
<body>
    <nav>
        <div class="logo"><img src="ap.png" alt="Allure Logo"></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="pg_1.html">About</a></li>
            <li><a href="pg_2.html">Products</a></li>
            <li><a href="pg_3.html">Support</a></li>
        </ul>
    </nav>

    <main class="animate-page exclusive-layout">
        <div class="product-grid featured-dual">
            
            <div class="product-card" onclick="showProduct('Signature T-Shirt', '$70', 'shirt-front.jpg', 'Premium cotton blend with a tailored fit. Designed for lasting comfort.')">
                <div class="img-box">
                    <img src="shirt-front.jpg" alt="T-Shirt Front" class="front-img">
                    <img src="shirt-back.jpg" alt="T-Shirt Back" class="back-img">
                </div>
                <h3 style="margin-top: 15px;">Signature T-Shirt</h3>
                <p style="color: #777;">$70</p>
            </div>

            <div class="product-card" onclick="showProduct('Allure Essence', '$70', 'perfume.jpg', 'A luxury fragrance featuring deep floral notes and a woody finish.')">
                <div class="img-box">
                    <img src="perfume.jpg" alt="Perfume">
                </div>
                <h3 style="margin-top: 15px;">Allure Essence</h3>
                <p style="color: #777;">$70</p>
            </div>

        </div>
    </main>

    <div id="productSidebar" class="product-sidebar">
        <span class="sidebar-close" onclick="closeSidebar()">&times;</span>
        <img id="sideImg" src="" class="sidebar-img">
        <div class="sidebar-content">
            <h2 id="sideTitle" style="font-weight: 200; margin-bottom: 10px;">Product Name</h2>
            <p id="sidePrice" style="font-weight: bold; color: #eb64a0; margin-bottom: 15px;">$0.00</p>
            <p id="sideDesc" style="color: #555; line-height: 1.6;">Description goes here.</p>
        </div>
    </div>

    <div class="member-lock" onclick="checkAccess()">
        <span>&#128274;</span>
    </div>
    
    <script>
    // This is the specific function to open the sidebar
    function showProduct(name, price, image, description) {
        document.getElementById('sideTitle').innerText = name;
        document.getElementById('sidePrice').innerText = price;
        document.getElementById('sideImg').src = image;
        document.getElementById('sideDesc').innerText = description;
        
        // This adds the 'active' class which slides it in
        document.getElementById('productSidebar').classList.add('active');
    }

    function closeSidebar() {
        document.getElementById('productSidebar').classList.remove('active');
    }

    // Password Lock
    function checkAccess() {
        let userPass = prompt("Allure Security:");
        if (userPass === "alure12122323") {
            window.location.href = "pg_admin.html";
        }
    }

    // Close sidebar if user clicks outside of it
    window.onclick = function(event) {
        let sidebar = document.getElementById('productSidebar');
        if (event.target == document.querySelector('.exclusive-layout')) {
            closeSidebar();
        }
    }
    </script>
</body>
</html>
